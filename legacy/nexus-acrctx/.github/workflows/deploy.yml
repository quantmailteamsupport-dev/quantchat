name: Quantchat Deploy

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional release notes for this deployment run
        required: false
        type: string
  push:
    branches: [main, master]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/deploy.yml"

concurrency:
  group: quantchat-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight (Typecheck + Build)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/database

      - name: Type check
        run: npm run check-types

      - name: Build all packages
        run: npm run build

  deploy_web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace web

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantchat-web-out
          path: apps/web/out
          if-no-files-found: error

      - name: Deploy to Vercel (optional)
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --cwd apps/web --token "$VERCEL_TOKEN"
          npx vercel deploy --prod --cwd apps/web --token "$VERCEL_TOKEN"

  deploy_android:
    name: Deploy Android
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build web bundle
        run: npm run build

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build Android release artifact
        run: ./gradlew assembleRelease
        working-directory: apps/web/android

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantchat-android-release
          path: |
            apps/web/android/app/build/outputs/apk/release/*.apk
            apps/web/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

  deploy_ios:
    name: Deploy iOS
    runs-on: macos-14
    needs: preflight
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build web bundle
        run: npm run build

      - name: Ensure iOS project exists
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: apps/web/ios/App

      - name: Build iOS app (unsigned simulator build)
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: apps/web/ios/App

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantchat-ios-build
          path: apps/web/ios/build/Build/Products/Release-iphonesimulator/App.app
          if-no-files-found: warn
