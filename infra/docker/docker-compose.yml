version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: quantchat-postgres
    environment:
      POSTGRES_DB: quantchat_prod
      POSTGRES_USER: quantchat_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantchat_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantchat-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quantchat-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-in-production} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantchat-network

  # API Gateway
  # In CI, API_GATEWAY_IMAGE is set to a prebuilt GHCR image.
  # Locally, leave it unset and Docker Compose builds from source.
  api-gateway:
    image: ${API_GATEWAY_IMAGE:-quantchat/api-gateway:local}
    container_name: quantchat-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://quantchat_app:${DB_PASSWORD:-change-me-in-production}@postgres:5432/quantchat_prod?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN}
      ADMIN_SECRET: ${ADMIN_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    networks:
      - quantchat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: quantchat-nginx
    depends_on:
      - api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/quantchat/deploy/aws/quantchat-nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/quantchat/deploy/aws/ssl:/etc/nginx/ssl:ro
    networks:
      - quantchat-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  quantchat-network:
    driver: bridge
