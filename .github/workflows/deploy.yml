name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/api-gateway
  WEB_IMAGE_NAME: ${{ github.repository }}/web

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    outputs:
      api_image_tag: ${{ steps.meta-api.outputs.tag }}
      web_image_tag: ${{ steps.meta-web.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta-api
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Compute web image tag
        id: meta-web
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-api.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: ./Nexus
          file: ./Nexus/apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-web.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_QUANTCHAT_API_URL=http://${{ secrets.EC2_HOST }}
            NEXT_PUBLIC_WS_URL=http://${{ secrets.EC2_HOST }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "infra/docker/docker-compose.yml"
          target: "/opt/quantchat"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -eux
            cd /opt/quantchat

            cat > .env <<ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=http://${{ secrets.EC2_HOST }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            CORS_ORIGINS=*
            LOG_LEVEL=info
            ENVEOF
            chmod 600 .env

            # Write nginx config routing frontend + API
            cat > /opt/quantchat/nginx.conf <<'NGINXEOF'
            events { worker_connections 1024; }

            http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              sendfile on;
              keepalive_timeout 65;

              upstream api_backend {
                server api-gateway:3000;
              }

              upstream web_frontend {
                server web:3000;
              }

              server {
                listen 80;
                server_name _;
                client_max_body_size 50M;

                # NextAuth routes → web (Next.js handles /api/auth/*)
                location /api/auth/ {
                  proxy_pass http://web_frontend;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60s;
                }

                # API v1 + health routes → api-gateway
                location ~ ^/(api/v1|healthz|readyz)(/|$) {
                  proxy_pass http://api_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                }

                # WebSocket (Socket.io) → api-gateway
                location /socket.io/ {
                  proxy_pass http://api_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_read_timeout 3600s;
                }

                # Everything else → Next.js frontend
                location / {
                  proxy_pass http://web_frontend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                }
              }
            }
            NGINXEOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.api_image_tag }}
            docker pull ${{ needs.build.outputs.web_image_tag }}

            export API_GATEWAY_IMAGE='${{ needs.build.outputs.api_image_tag }}'
            export WEB_IMAGE='${{ needs.build.outputs.web_image_tag }}'

            docker compose -f docker-compose.yml down || true
            docker compose -f docker-compose.yml up -d
            docker compose -f docker-compose.yml ps

            # Run Prisma migrations
            sleep 10
            docker exec quantchat-api sh -c 'cd /app/packages/database && npx prisma db push --skip-generate' || true

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -eux
            for i in $(seq 1 20); do
              if curl -fsS http://localhost:3000/healthz >/dev/null 2>&1; then
                echo "API gateway healthy"
                break
              fi
              echo "API attempt $i/20 - waiting..."
              sleep 5
            done
            for i in $(seq 1 20); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ 2>/dev/null || echo "000")
              if [ "$STATUS" != "000" ] && [ "$STATUS" != "502" ] && [ "$STATUS" != "503" ]; then
                echo "Web frontend healthy (HTTP $STATUS)"
                exit 0
              fi
              echo "Web attempt $i/20 (HTTP $STATUS) - waiting..."
              sleep 5
            done
            echo "Healthcheck failed after 100s"
            docker compose -f /opt/quantchat/docker-compose.yml logs --tail=50 web
            docker compose -f /opt/quantchat/docker-compose.yml logs --tail=50 api-gateway
            exit 1
