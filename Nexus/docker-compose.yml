services:
  # Database layer
  db:
    image: postgres:15-alpine
    container_name: quantchat-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quantchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantchat_user -d quantchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for TwinService queuing and API Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: quantchat-redis
    restart: always
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - redisdata:/data
    networks:
      - quantchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend: API Gateway (WebSockets & Auth)
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: quantchat-api-gateway
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT:?API_PORT is required}
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - AWS_REGION=${AWS_REGION:?AWS_REGION is required}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      - S3_BUCKET=${S3_BUCKET:?S3_BUCKET is required}
      - CDN_BASE_URL=${CDN_BASE_URL:?CDN_BASE_URL is required}
      - S3_PRESIGN_EXPIRY_SECONDS=${S3_PRESIGN_EXPIRY_SECONDS:?S3_PRESIGN_EXPIRY_SECONDS is required}
    ports:
      - "${API_PORT:?API_PORT is required}:${API_PORT:?API_PORT is required}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantchat-network

  # Frontend: Next.js + React Three Fiber + Tailwind
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: quantchat-web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=${WEB_PORT:?WEB_PORT is required}
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - NEXT_PUBLIC_QUANTCHAT_API_URL=${NEXT_PUBLIC_QUANTCHAT_API_URL:?NEXT_PUBLIC_QUANTCHAT_API_URL is required}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
      - QUANTCHAT_API_URL=${QUANTCHAT_API_URL:?QUANTCHAT_API_URL is required}
      - QUANTMAIL_API_URL=${QUANTMAIL_API_URL:?QUANTMAIL_API_URL is required}
    ports:
      - "${WEB_PORT:?WEB_PORT is required}:${WEB_PORT:?WEB_PORT is required}"
    depends_on:
      - api-gateway
    networks:
      - quantchat-network

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: quantchat-admin
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_PORT:?ADMIN_PORT is required}
      - HOSTNAME=0.0.0.0
      - ADMIN_SECRET=${ADMIN_SECRET:?ADMIN_SECRET is required}
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    ports:
      - "${ADMIN_PORT:?ADMIN_PORT is required}:${ADMIN_PORT:?ADMIN_PORT is required}"
    depends_on:
      - api-gateway
    networks:
      - quantchat-network

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    container_name: quantchat-docs
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=${DOCS_PORT:?DOCS_PORT is required}
      - HOSTNAME=0.0.0.0
    ports:
      - "${DOCS_PORT:?DOCS_PORT is required}:${DOCS_PORT:?DOCS_PORT is required}"
    depends_on:
      - web
    networks:
      - quantchat-network

volumes:
  pgdata:
  redisdata:

networks:
  quantchat-network:
    driver: bridge
